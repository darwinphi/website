<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="apple-touch-icon" sizes="180x180" href="/img/favicon-180x180.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="48x48" href="/img/favicon-48x48.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/img/favicon-64x64.png" />
    <link rel="icon" type="image/png" sizes="128x128" href="/img/favicon-128x128.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/img/favicon-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/img/favicon-512x512.png" />
    <script>
      // GitHub Pages SPA redirect: forward the path as a query param so index.html can restore it
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        '/?redirect=' + encodeURIComponent(path + search + hash),
      );
    </script>
  </head>
</html>
