<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect: forward the path as a query param so index.html can restore it
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      window.location.replace(
        '/?redirect=' + encodeURIComponent(path + search + hash),
      );
    </script>
  </head>
</html>
